<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Citizen - Smart City Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="d-flex">
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <h4 class="text-white mb-0">Smart City Admin</h4>
            </div>
            <ul class="list-unstyled components">
                <li><a href="admin.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                <li><a href="citizens.html"><i class="bi bi-people"></i> Citizens</a></li>
                <li><a href="transport.html"><i class="bi bi-truck"></i> Transport</a></li>
                <li><a href="internet.html"><i class="bi bi-wifi"></i> Internet</a></li>
                <li><a href="utilities.html"><i class="bi bi-lightning"></i> Utilities</a></li>
                <li><a href="healthcare.html"><i class="bi bi-heart-pulse"></i> Healthcare</a></li>
                <li><a href="complaints.html"><i class="bi bi-exclamation-circle"></i> Complaints</a></li>
                <li><a href="maintenance.html"><i class="bi bi-wrench"></i> Maintenance</a></li>
                <li><a href="bookings.html"><i class="bi bi-calendar"></i> Bookings</a></li>
                <li><a href="announcements.html"><i class="bi bi-bell"></i> Announcements</a></li>
                <li class="active"><a href="add-citizen.html"><i class="bi bi-person-plus"></i> Add Citizen</a></li>
                <li><a href="departments.html"><i class="bi bi-building"></i> Departments</a></li>
            </ul>
        </nav>

        <div id="content" class="flex-fill">
            <div class="container-fluid p-4">
                <div class="mb-4">
                    <h1 class="h2 fw-bold">Add New Citizen</h1>
                    <p class="text-muted">Register a new citizen in the system</p>
                </div>

                <div class="row">
                    <div class="col-lg-8">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="mb-0">Citizen Information</h5>
                            </div>
                            <div class="card-body">
                                <form id="citizenForm">
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label for="name" class="form-label">Full Name</label>
                                            <input type="text" class="form-control" id="name" placeholder="Enter full name" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="email" class="form-label">Email</label>
                                            <input type="email" class="form-control" id="email" placeholder="Enter email address" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="phone" class="form-label">Phone Number</label>
                                            <input type="tel" class="form-control" id="phone" placeholder="Enter phone number" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="address" class="form-label">Address</label>
                                            <input type="text" class="form-control" id="address" placeholder="Enter street address" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="city" class="form-label">City</label>
                                            <input type="text" class="form-control" id="city" placeholder="Enter city" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="zipCode" class="form-label">ZIP Code</label>
                                            <input type="text" class="form-control" id="zipCode" placeholder="Enter ZIP code" required>
                                        </div>
                                    </div>
                                    <div class="d-flex gap-3 mt-4">
                                        <button type="submit" class="btn btn-primary flex-fill">Add Citizen</button>
                                        <a href="citizens.html" class="btn btn-outline-secondary flex-fill">Cancel</a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
