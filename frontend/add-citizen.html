<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Citizen - Smart City Admin</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      />

    <link 
      rel="stylesheet"
       href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css"
    />

    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/uicons-bold-rounded/css/uicons-bold-rounded.css"
    />
    <!-- // -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      :root {
        --primary-color: rgba(255, 255, 255, 0.6); /* Deep clean blue */
        --secondary-color: rgba(255, 255, 255, 0.6); /* Accent blue */
        --sidebar-width: 260px;
        --bg-light: #f5f8ff;
        --text-dark: #03045E;
      }

      html, body {
        height: 100%;
      }
      body {
        font-family: "Montserrat", sans-serif;
background:
    /* 1. NEW: Semi-transparent white background color */
            linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)),
            /* Subtle dark overlay for readability */
            
                /* Your provided image link */
            url('https://i.ibb.co/S4yxVvP2/img-smartcity.jpg ') center center / cover no-repeat fixed;
            background-color: rgba(255, 0, 0, 0.94); 
            color: var(--text-dark);
        margin: 0;
        padding: 0;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: var(--sidebar-width);
        
        background: linear-gradient(
          180deg,
          var(--primary-color),
          var(--secondary-color)
        );
        box-shadow: 4px 0 12px rgba(0, 0, 0, 0.05);
        border-top-right-radius: 20px;
        border-bottom-right-radius: 20px;

        color: rgba(0, 3, 154, 0.866);
        overflow-y: auto;
        transition: all 0.3s;
        z-index: 1000;
        transition: margin-left 0.4s ease-in-out;
      }

      .sidebar-header {
        padding: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .nav-link {
        color: #03045E;
        padding: 12px 20px;
        border-radius: 10px;
        transition: all 0.3s;
        display: flex;
        align-items: center;
      }

      .nav-link:hover {
        background-color: #0076b680;
        transform: translateX(5px);

        color: rgb(0, 5, 137);
      }

      .nav-link.active {
        background-color: #03045e;
        color: #CAF0F8;
        font-weight: 600;
      }

      .nav-link i {
        margin-right: 10px;
        width: 20px;
        text-align: center;
      }

      .main-content {
        margin-left: var(--sidebar-width);
        padding: 20px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .welcome-banner {
        background: linear-gradient(
          135deg,
          var(--primary-color),
          var(--secondary-color)
        );
        border-radius: 15px;
        padding: 30px;
        color: #03045E;
        margin-bottom: 30px;
        box-shadow: 0 10px 25px #03055e76;
      }

      .stats-card {
        background: rgba(255, 255, 255, 0.6);
        border-radius: 18px;
        padding: 25px;
        backdrop-filter: blur(10px);

        box-shadow: 0 4px 15px #03055e78;
        transition: all 0.3s ease;
        border-left: 4px solid;
        color: #03045E;
      }

      .stats-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 20px #03055e70;
      }

      .stats-card.blue {
        border-left-color: blue;
      }
      .stats-card.green {
        border-left-color: green;
      }
      .stats-card.purple {
        border-left-color: darkblue;
      }
      .stats-card.orange {
        border-left-color: orange;
      }

      .card {
        background:rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(10px);
        border: none;
        transition: all 0.3s ease;

        border-radius: 18px;
        box-shadow: 0 4px 15px #03055e67;
        color: #03045E;
      }

      .quick-action-btn {
        display: flex;
        align-items: center;
        padding: 14px;
        border: 1.5px solid #e5e7eb;
        border-radius: 12px;
        transition: all 0.3s;
        text-decoration: none;
        color: #374151;
        margin-bottom: 10px;
        color: var(--text-dark);
        background: #ffffff89;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
      }

      .quick-action-btn:hover {
        background: var(--bg-light);
        transform: translateY(-3px);
        border-color: #03045E;
        color: #03045E;
      }

      .activity-item {
        padding: 12px;
        border-left: 3px solid;
        margin-bottom: 10px;
        border-radius: 5px;
        background-color: #ffffffba;
        color: #03045E;
      }

      .activity-item.pending {
        border-left-color: #fbbf24;
      }
      .activity-item.confirmed {
        border-left-color: #3b82f6;
      }
      .activity-item.completed {
        border-left-color: #10b981;
      }

      .announcement-card {
        border-left: 4px solid var(--primary-color);
        padding: 16px;
        background: #ffffff89;
        border-radius: 12px;
        margin-bottom: 15px;
        transition: 0.3s;
        color: #03045E;
      }
      .announcement-card:hover {
        background: #e8f0ff;
      }

      .city-metric {
        display: flex;
        align-items: center;
        padding: 15px;
        background-color: #ffffffb4;
        border-radius: 10px;
      }

      .metric-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        margin-right: 15px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
      }

      .btn-primary,
      .btn-light {
        border-radius: 10px;
        font-weight: 600;
        padding: 10px 18px;
        transition: all 0.3s;
      }

      .btn-primary {
        background: var(--primary-color);
        border: none;
      }

      .btn-primary:hover {
        background: var(--secondary-color);
      }

      .btn-outline-primary {
        color: #03045E; /* Dark blue text */
        border-color: #03045E; /* Dark blue border */
      }

      .btn-outline-primary:hover {
        background-color: #03045E; /* Dark blue background on hover */
        color: #CAF0F8; /* Light blue text on hover */
      }

      @media (max-width: 768px) {
        .sidebar {
          margin-left: calc(-1 * var(--sidebar-width));
        }
        .sidebar.show {
          margin-left: 0;
        }
        .main-content {
          margin-left: 0;
        }
      }

      /* // */
      /* Enhanced Responsive Logo Styling */
      .logo-img {
        width: 200px; /* Bigger default size */
        max-width: 60%; /* Prevents overflow on smaller viewports */
        height: auto;
        margin-bottom: 30px;
        border-radius: 15px;
        object-fit: contain;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        box-shadow: 0 8px 22px #03055e7a;
        background-color: #ffffffd0;
      }

      /* Hover animation to match the elegant button style */
      .logo-img:hover {
        transform: scale(1.06);
        box-shadow: 0 10px 28px rgba(19, 63, 110, 0.568);
      }

      /* Responsive adjustments for various screen sizes */
      @media (max-width: 992px) {
        .logo-img {
          width: 170px;
          margin-bottom: 25px;
        }
      }

      @media (max-width: 768px) {
        .logo-img {
          width: 140px;
          margin-bottom: 22px;
        }
      }

      @media (max-width: 576px) {
        .logo-img {
          width: 110px;
          margin-bottom: 18px;
        }
      }

      /* // */
    </style>
</head>
<body>
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>
              <img src="assets/07.png" alt="Smart City Logo" class="logo-img" />
              SmartCity
            </h3>
            <small>ADMIN</small>
        </div>
        <ul class="nav flex-column mt-3">
            <li class="nav-item">
                <a class="nav-link" href="admin.html"><i class="fas fa-home"></i> Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="citizen.html"><i class="fas fa-users"></i> Citizens</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="transport.html"><i class="fas fa-bus"></i> Transport</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="internet.html"><i class="fas fa-wifi"></i> Internet</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="utilities.html"><i class="fas fa-water"></i> Utilities</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="healthcare.html"><i class="fas fa-hospital"></i> Healthcare</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="complaints.html"><i class="fas fa-exclamation-circle"></i> Complaints</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="maintenance.html"><i class="fas fa-wrench"></i> Maintenance</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="bookings.html"><i class="fas fa-calendar-alt"></i> Bookings</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="announcements-admin.html"><i class="fas fa-bullhorn"></i> Announcements</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="add-citizen.html"><i class="fas fa-user-plus"></i> Add Citizen</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="departments.html"><i class="fas fa-building"></i> Departments</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div id="content" class="main-content">
        <div class="container-fluid p-4">
            <div class="mb-4">
                <h1 class="h2 fw-bold">Add New Citizen</h1>
                <p class="text-muted">Register a new citizen in the system</p>
            </div>

            <div class="row flex-grow-1">
                <div class="col-lg-12">
                    <div class="card h-100">
                        <div class="card-header">
                            <h5 class="mb-0">Citizen Information</h5>
                        </div>
                        <div class="card-body">
                            <form id="citizenForm">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label for="name" class="form-label">Full Name</label>
                                        <input type="text" class="form-control" id="name" placeholder="Enter full name" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="email" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="email" placeholder="Enter email address" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="phone" class="form-label">Phone Number</label>
                                        <input type="tel" class="form-control" id="phone" placeholder="Enter phone number" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="address" class="form-label">Address</label>
                                        <input type="text" class="form-control" id="address" placeholder="Enter street address" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="city" class="form-label">City</label>
                                        <input type="text" class="form-control" id="city" placeholder="Enter city" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="zipCode" class="form-label">ZIP Code</label>
                                        <input type="text" class="form-control" id="zipCode" placeholder="Enter ZIP code" required>
                                    </div>
                                </div>
                                <div class="d-flex gap-3 mt-4">
                                    <button type="submit" class="btn btn-outline-primary flex-fill">Add Citizen</button>
                                    <a href="citizens.html" class="btn btn-outline-secondary flex-fill">Cancel</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
      function logout() {
        if (confirm("Are you sure you want to logout?")) {
          localStorage.clear();
          window.location.href = "login.html";
        }
      }
    </script>
</body>
</html>
