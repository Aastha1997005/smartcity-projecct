<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Your Profile - Smart City</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .profile-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 700px;
            width: 100%;
            padding: 40px;
        }
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile-header .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 2rem;
        }
        .form-label {
            font-weight: 600;
            color: #495057;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .progress-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .role-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="profile-header">
            <div class="icon">
                <i class="fas fa-user-circle"></i>
            </div>
            <h2>Complete Your Profile</h2>
            <p class="text-muted">Please provide your details to activate your account</p>
            <span class="role-badge" id="roleBadge"></span>
        </div>

        <div id="alertContainer"></div>

        <!-- Progress Bar -->
        <div class="progress mb-4" style="height: 5px;">
            <div class="progress-bar" role="progressbar" style="width: 0%" id="progressBar"></div>
        </div>

        <!-- Citizen Form -->
        <form id="citizenForm" class="profile-form" style="display: none;">
            <h5 class="mb-3"><i class="fas fa-user me-2"></i>Personal Information</h5>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">First Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="first_name" required pattern="[A-Za-z ]{2,}" title="Please enter a valid first name (letters and spaces only, min 2 chars)">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Last Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="last_name" required pattern="[A-Za-z ]{2,}" title="Please enter a valid last name (letters and spaces only, min 2 chars)">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Gender <span class="text-danger">*</span></label>
                    <select class="form-select" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Date of Birth <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" name="dob" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Street Address</label>
                    <input type="text" class="form-control" name="street" placeholder="Street, Building Number">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Area <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="area" required placeholder="e.g., Vijay Nagar">
                </div>
                <div class="col-md-4">
                    <label class="form-label">City <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="city" value="Indore" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Pincode <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="pincode" required placeholder="452001" pattern="\d{6}" maxlength="6" inputmode="numeric" title="Pincode must be 6 digits">
                </div>
                <div class="col-md-6">
                    <label class="form-label">House ID (Optional)</label>
                    <input type="number" class="form-control" name="house_id" placeholder="If you know your house ID" min="0" list="house-list">
                    <datalist id="house-list"></datalist>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-4">
                <i class="fas fa-check-circle me-2"></i>Complete Profile
            </button>
        </form>

        <!-- Doctor Form -->
        <form id="doctorForm" class="profile-form" style="display: none;">
            <h5 class="mb-3"><i class="fas fa-user-md me-2"></i>Doctor Information</h5>
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">Full Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="name" required placeholder="Dr. John Doe">
                </div>
                <div class="col-12">
                    <label class="form-label">Specialisation <span class="text-danger">*</span></label>
                    <select class="form-select" name="specialisation" required>
                        <option value="">Select Specialisation</option>
                        <option value="Cardiologist">Cardiologist</option>
                        <option value="Orthopedic">Orthopedic</option>
                        <option value="Pediatrician">Pediatrician</option>
                        <option value="Neurologist">Neurologist</option>
                        <option value="General Physician">General Physician</option>
                        <option value="Surgeon">Surgeon</option>
                        <option value="Dermatologist">Dermatologist</option>
                        <option value="ENT Specialist">ENT Specialist</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-4">
                <i class="fas fa-check-circle me-2"></i>Complete Profile
            </button>
        </form>

        <!-- Provider Form -->
        <form id="providerForm" class="profile-form" style="display: none;">
            <h5 class="mb-3"><i class="fas fa-briefcase me-2"></i>Service Provider Information</h5>
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">Company/Organization Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="name" required placeholder="ABC Services Ltd.">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Contact Number <span class="text-danger">*</span></label>
                    <input type="tel" class="form-control" name="contact_no" required placeholder="9876543210" pattern="\d{10}" maxlength="10" inputmode="numeric" title="Enter 10 digit mobile number">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Service Type <span class="text-danger">*</span></label>
                    <select class="form-select" name="service_type" required>
                        <option value="">Select Service Type</option>
                        <option value="Utility">Utility Services</option>
                        <option value="Transport">Transport Services</option>
                        <option value="Health Care">Health Care</option>
                        <option value="Internet">Internet/Telecom</option>
                        <option value="Waste Management">Waste Management</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-4">
                <i class="fas fa-check-circle me-2"></i>Complete Profile
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="login.html" class="text-decoration-none">
                <i class="fas fa-arrow-left me-2"></i>Back to Login
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE_URL = 'http://localhost:5000/api';

        function isValidEmail(email) {
            if (!email) return false;
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function isValidPhone(phone) {
            if (!phone) return false;
            const re = /^\d{10}$/;
            return re.test(phone);
        }

        function isValidPincode(pin) {
            if (!pin) return false;
            const re = /^\d{6}$/;
            return re.test(pin);
        }

        function isValidName(name) {
            if (!name) return false;
            const re = /^[A-Za-z ]{2,}$/;
            return re.test(name);
        }

        function isValidDOB(dob) {
            if (!dob) return false;
            const date = new Date(dob);
            const now = new Date();
            return date instanceof Date && !isNaN(date) && date < now;
        }

        // ------- Validation helpers -------
        function isValidEmail(email) {
            if (!email) return false;
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function isValidPhone(phone) {
            if (!phone) return false;
            const re = /^\d{10}$/;
            return re.test(phone);
        }

        function isValidPincode(pin) {
            if (!pin) return false;
            const re = /^\d{6}$/;
            return re.test(pin);
        }

        function isValidName(name) {
            if (!name) return false;
            const re = /^[A-Za-z ]{2,}$/;
            return re.test(name);
        }

        function isValidDOB(dob) {
            if (!dob) return false;
            const date = new Date(dob);
            const now = new Date();
            return date instanceof Date && !isNaN(date) && date < now;
        }
        
        // Check if user needs profile completion
        const needsProfileCompletion = localStorage.getItem('needsProfileCompletion');
        const tempEmail = localStorage.getItem('tempEmail');
        const tempRole = localStorage.getItem('tempRole');
        
        if (!needsProfileCompletion || !tempEmail || !tempRole) {
            window.location.href = 'login.html';
        }

        // Display role badge (human-friendly)
        document.getElementById('roleBadge').textContent = tempRole.charAt(0).toUpperCase() + tempRole.slice(1).replace('_',' ');
        
        // Show appropriate form based on role
        const forms = {
            'citizen': document.getElementById('citizenForm'),
            'healthcare': document.getElementById('doctorForm'),
            'transport': document.getElementById('providerForm'),
            'utility': document.getElementById('providerForm'),
            'internet': document.getElementById('providerForm')
        };
        
        const currentForm = forms[tempRole];
        if (currentForm) {
            currentForm.style.display = 'block';
            updateProgress(30);
        }

        // Update progress bar
        function updateProgress(percent) {
            document.getElementById('progressBar').style.width = percent + '%';
        }

        // Show alert
        function showAlert(message, type = 'danger') {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        // Update progress on form input
        document.querySelectorAll('input, select').forEach(element => {
            element.addEventListener('input', () => {
                const form = element.closest('form');
                const inputs = form.querySelectorAll('input[required], select[required]');
                const filled = Array.from(inputs).filter(input => input.value).length;
                const progress = 30 + (filled / inputs.length * 70);
                updateProgress(progress);
            });
        });

        // Handle Citizen Form Submission
        document.getElementById('citizenForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log('Citizen form submitted');
            // Client-side validation
            const dataCheck = Object.fromEntries(new FormData(e.target));
            if (!isValidEmail(localStorage.getItem('tempEmail'))) {
                showAlert('Invalid email format.');
                return;
            }
            if (!isValidPincode(dataCheck.pincode)) {
                showAlert('Pincode must be 6 digits.');
                return;
            }
            if (!isValidName(dataCheck.first_name) || !isValidName(dataCheck.last_name)) {
                showAlert('Please enter valid names.');
                return;
            }
            if (!isValidDOB(dataCheck.dob)) {
                showAlert('Please enter a valid date of birth.');
                return;
            }
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Saving...';
            
            try {
                console.log('Sending complete profile request with data:', data);
                // Complete citizen profile
                data.username = localStorage.getItem('tempEmail');
                data.role = localStorage.getItem('tempRole');
                const response = await fetch(`${API_BASE_URL}/auth/complete-profile`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                console.log('Received response:', response);
                if (response.ok) {
                    console.log('Profile completed successfully');
                    showAlert('Profile completed successfully! Redirecting to dashboard...', 'success');
                    updateProgress(100);
                    localStorage.removeItem('needsProfileCompletion');
                    localStorage.removeItem('tempEmail');
                    localStorage.removeItem('tempRole');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                } else {
                    const error = await response.json();
                    console.error('Profile completion error:', error);
                    showAlert(error.error || 'Failed to complete profile. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-check-circle me-2"></i>Complete Profile';
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('An unexpected error occurred. Please try again. ' + error.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-check-circle me-2"></i>Complete Profile';
            }
        });

        // Handle Doctor Form Submission
        document.getElementById('doctorForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log('Doctor form submitted');
            // Add any doctor-specific validations here if needed
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            submitBtn.disabled = true;

            try {

                // Complete doctor profile
                data.username = localStorage.getItem('tempEmail');

                const response = await fetch(`${API_BASE_URL}/auth/complete-profile`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                console.log('Received response:', response);
                if (response.ok) {
                    console.log('Profile completed successfully');
                    showAlert('Profile completed successfully! Redirecting to dashboard...', 'success');
                    updateProgress(100);
                    localStorage.removeItem('needsProfileCompletion');
                    localStorage.removeItem('tempEmail');
                    localStorage.removeItem('tempRole');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                } else {
                    const error = await response.json();
                    console.error('Profile completion error:', error);
                    showAlert(error.error || 'Failed to complete profile. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-check-circle me-2"></i>Complete Profile';
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('An unexpected error occurred. Please try again. ' + error.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-check-circle me-2"></i>Complete Profile';
            }
        });

        // Handle Provider Form Submission
        document.getElementById('providerForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log('Provider form submitted');
            const dataCheck = Object.fromEntries(new FormData(e.target));
            if (!isValidPhone(dataCheck.contact_no)) {
                showAlert('Contact number must be a 10 digit number.');
                return;
            }
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Saving...';
            
            try {
                console.log('Sending complete profile request with data:', data);
                // Complete provider profile
                data.username = localStorage.getItem('tempEmail');
                data.role = localStorage.getItem('tempRole');
                const response = await fetch(`${API_BASE_URL}/auth/complete-profile`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                console.log('Received response:', response);
                if (response.ok) {
                    console.log('Profile completed successfully');
                    showAlert('Profile completed successfully! Redirecting to dashboard...', 'success');
                    updateProgress(100);
                    localStorage.removeItem('needsProfileCompletion');
                    localStorage.removeItem('tempEmail');
                    localStorage.removeItem('tempRole');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                } else {
                    const error = await response.json();
                    console.error('Profile completion error:', error);
                    showAlert(error.error || 'Failed to complete profile. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-check-circle me-2"></i>Complete Profile';
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('An unexpected error occurred. Please try again. ' + error.message);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-check-circle me-2"></i>Complete Profile';
            }
        });

        // ------- Validation helpers -------\n        function isValidEmail(email) {\n            if (!email) return false;\n            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;\n            return re.test(email);\n        }\n\n        function isValidPhone(phone) {\n            if (!phone) return false;\n            const re = /^\d{10}$/;\n            return re.test(phone);\n        }

        function isValidPincode(pin) {
            if (!pin) return false;
            const re = /^\d{6}$/;
            return re.test(pin);
        }

        function isValidName(name) {
            if (!name) return false;
            const re = /^[A-Za-z ]{2,}$/;
            return re.test(name);
        }

        function isValidDOB(dob) {
            if (!dob) return false;
            const date = new Date(dob);
            const now = new Date();
            return date instanceof Date && !isNaN(date) && date < now;
        }

        // Fetch and populate houses
        async function populateHouses() {
            try {
                const response = await fetch(`${API_BASE_URL}/houses`);
                if (response.ok) {
                    const houses = await response.json();
                    const houseList = document.getElementById('house-list');
                    houses.forEach(house => {
                        const option = document.createElement('option');
                        option.value = house.house_id;
                        option.textContent = `House ID: ${house.house_id}, Type: ${house.type}, Area: ${house.area}`;
                        houseList.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error fetching houses:', error);
            }
        }

        populateHouses();
    </script>
</body>
</html>
