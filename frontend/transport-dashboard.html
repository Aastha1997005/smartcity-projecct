<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport Dashboard - Smart City</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --primary-color: rgba(255, 255, 255, 0.6); /* Deep clean blue */
            --secondary-color: rgba(255, 255, 255, 0.6); /* Accent blue */
            --sidebar-width: 260px;
            --bg-light: #f5f8ff;
            --text-dark: #03045E;
        }

        body {
            font-family: "Montserrat", sans-serif;
            background: linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)),
                        url('https://i.ibb.co/S4yxVvP2/img-smartcity.jpg') center center / cover no-repeat fixed;
            background-color: rgba(237, 236, 236, 0.94);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: var(--sidebar-width);
            background: linear-gradient(180deg, var(--primary-color), var(--secondary-color));
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.05);
            border-top-right-radius: 20px;
            border-bottom-right-radius: 20px;
            color: rgba(0, 3, 154, 0.866);
            overflow-y: auto;
            transition: all 0.3s;
            z-index: 1000;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        
        .logo-img {
            width: 150px;
            margin-bottom: 15px;
        }

        .nav-link {
            color: #03045E !important;
            padding: 12px 20px;
            border-radius: 10px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
        }

        .nav-link:hover {
            background-color: #03045e !important;
            transform: translateX(5px);
            color: #CAF0F8 !important;
        }

        .nav-link.active {
            background-color: #03045e;
            color: #CAF0F8 !important;
            font-weight: 600;
        }

        .nav-link i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 20px;
            min-height: 100vh;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px #03055e67;
        }

        .card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 18px;
            box-shadow: 0 4px 15px #03055e67;
            color: #03045E;
        }

        .btn-custom {
            background-color: #FFF;
            color: #03045e;
            border: 1px solid #03045e;
            font-weight: 600;
        }

        .btn-custom:hover {
            background-color: #03045e;
            border-color: #03045e;
            color: #CAF0F8;
        }

        @media (max-width: 768px) {
            .sidebar {
                margin-left: calc(-1 * var(--sidebar-width));
            }
            .sidebar.show {
                margin-left: 0;
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="assets/07.png" alt="Smart City Logo" class="logo-img">
            <h3>Transport</h3>
            <small id="userRole">TRANSPORT DASHBOARD</small>
        </div>

        <ul class="nav flex-column mt-3">
            <li class="nav-item">
                <a class="nav-link" href="transport-main-dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="transport-dashboard.html"><i class="fas fa-bus"></i> Schedules</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="transport-routes.html"><i class="fas fa-route"></i> Routes</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="top-bar">
            <h1 class="h4">Schedule Management</h1>
            <button class="btn btn-light d-md-none" onclick="toggleSidebar()">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <div class="card">
            <div class="card-body">
                <button class="btn btn-custom mb-3" data-bs-toggle="modal" data-bs-target="#scheduleModal">
                    <i class="fas fa-plus"></i> Add New Schedule
                </button>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Schedule ID</th>
                                <th>Transport ID</th>
                                <th>Route ID</th>
                                <th>Start Time</th>
                                <th>End Time</th>
                                <th>Frequency</th>
                                <th>Days</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="schedulesTableBody">
                            <!-- Rows will be inserted here by renderSchedules() -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Schedule Modal -->
    <div class="modal fade" id="scheduleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="scheduleModalLabel">Add/Edit Schedule</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="scheduleForm">
                        <input type="hidden" id="scheduleId">
                        <div class="mb-3">
                            <label for="transportId" class="form-label">Transport ID</label>
                            <input type="text" class="form-control" id="transportId" required>
                        </div>
                        <div class="mb-3">
                            <label for="routeId" class="form-label">Route ID</label>
                            <input type="text" class="form-control" id="routeId" required>
                        </div>
                        <div class="mb-3">
                            <label for="startTime" class="form-label">Start Time</label>
                            <input type="time" class="form-control" id="startTime" required>
                        </div>
                        <div class="mb-3">
                            <label for="endTime" class="form-label">End Time</label>
                            <input type="time" class="form-control" id="endTime" required>
                        </div>
                        <div class="mb-3">
                            <label for="frequency" class="form-label">Frequency (minutes)</label>
                            <input type="number" class="form-control" id="frequency" required>
                        </div>
                        <div class="mb-3">
                            <label for="daysOfOperation" class="form-label">Days of Operation</label>
                            <input type="text" class="form-control" id="daysOfOperation" placeholder="e.g., Mon-Fri" required>
                        </div>
                        <div class="mb-3">
                            <label for="status" class="form-label">Status</label>
                            <select class="form-select" id="status" required>
                                <option value="active">Active</option>
                                <option value="inactive">Inactive</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-custom">Save Schedule</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        const token = localStorage.getItem('token');

        function logout() {
            if (confirm("Are you sure you want to logout?")) {
                localStorage.clear();
                window.location.href = "login.html";
            }
        }

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("show");
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            loadSchedules();
        });

        async function loadSchedules() {
            try {
                // NOTE: This uses the /api/transportSchedules endpoint we fixed in server.js
                const response = await fetch(`${API_BASE_URL}/transportSchedules`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status} while fetching schedules`);
                }
                
                const schedules = await response.json();
                renderSchedules(schedules); // This function is now defined below
            } catch (error) {
                console.error('Error loading schedules:', error);
                if (error.message.includes('HTTP error!')) {
                    alert(`An error occurred while loading schedules: ${error.message}. Please check the server.`);
                } else if (error instanceof TypeError) { // e.g., network error or CORS
                    alert('A network error occurred while loading schedules. Please check your internet connection and try again.');
                } else {
                    alert('An unexpected error occurred while loading schedules. Please try again later.');
                }
            }
        }

        // --- NEW FUNCTION ADDED ---
        function renderSchedules(schedules) {
            const tableBody = document.getElementById('schedulesTableBody');
            tableBody.innerHTML = ''; // Clear existing rows
            if (!schedules || schedules.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="9" class="text-center">No schedules found.</td></tr>';
                return;
            }
            
            schedules.forEach(schedule => {
                const row = `
                    <tr>
                        <td>${schedule.schedule_id}</td>
                        <td>${schedule.transport_id}</td>
                        <td>${schedule.route_id}</td>
                        <td>${schedule.start_time}</td>
                        <td>${schedule.end_time}</td>
                        <td>${schedule.frequency}</td>
                        <td>${schedule.days_of_operation}</td>
                        <td>
                            <span class="badge ${schedule.status === 'active' ? 'bg-success' : 'bg-secondary'}">
                                ${schedule.status}
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="editSchedule(${schedule.schedule_id})"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-sm btn-danger" onclick="deleteSchedule(${schedule.schedule_id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }
        // --- END OF NEW FUNCTION ---

        document.getElementById('scheduleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const scheduleId = document.getElementById('scheduleId').value;
            const scheduleData = {
                transport_id: document.getElementById('transportId').value,
                route_id: document.getElementById('routeId').value,
                start_time: document.getElementById('startTime').value,
                end_time: document.getElementById('endTime').value,
                frequency: document.getElementById('frequency').value,
                days_of_operation: document.getElementById('daysOfOperation').value,
                status: document.getElementById('status').value,
            };

            const url = scheduleId 
                ? `${API_BASE_URL}/transportSchedules/${scheduleId}` 
                : `${API_BASE_URL}/transportSchedules`;
            const method = scheduleId ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(scheduleData)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`HTTP error! status: ${response.status}, message: ${errorData.error || 'Failed to save schedule'}`);
                }
                
                const modal = bootstrap.Modal.getInstance(document.getElementById('scheduleModal'));
                if (modal) {
                    modal.hide();
                }
                loadSchedules();
                document.getElementById('scheduleForm').reset();
            } catch (error) {
                console.error('Error saving schedule:', error);
                if (error.message.includes('HTTP error!')) {
                    alert(`An error occurred while saving schedule: ${error.message}. Please check the server.`);
                } else if (error instanceof TypeError) { // e.g., network error or CORS
                    alert('A network error occurred while saving schedule. Please check your internet connection and try again.');
                } else {
                    alert('An unexpected error occurred while saving schedule. Please try again later.');
                }
            }
        });

        function populateAndShowModal(schedule) {
            document.getElementById('scheduleId').value = schedule.schedule_id;
            document.getElementById('transportId').value = schedule.transport_id;
            document.getElementById('routeId').value = schedule.route_id;
            document.getElementById('startTime').value = schedule.start_time;
            document.getElementById('endTime').value = schedule.end_time;
            document.getElementById('frequency').value = schedule.frequency;
            document.getElementById('daysOfOperation').value = schedule.days_of_operation;
            document.getElementById('status').value = schedule.status;

            const modal = new bootstrap.Modal(document.getElementById('scheduleModal'));
            modal.show();
        }

        async function editSchedule(scheduleId) {
            try {
                const response = await fetch(`${API_BASE_URL}/transportSchedules/${scheduleId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status} while fetching schedule details`);
                }

                const schedule = await response.json();
                populateAndShowModal(schedule);
            } catch (error) {
                console.error('Error fetching schedule for edit:', error);
                if (error.message.includes('HTTP error!')) {
                    alert(`An error occurred while fetching schedule details: ${error.message}. Please check the server.`);
                } else if (error instanceof TypeError) { // e.g., network error or CORS
                    alert('A network error occurred while fetching schedule details. Please check your internet connection and try again.');
                } else {
                    alert('An unexpected error occurred while fetching schedule details. Please try again later.');
                }
            }
        }

        async function deleteSchedule(scheduleId) {
            if (!confirm('Are you sure you want to delete this schedule?')) return;

            try {
                const response = await fetch(`${API_BASE_URL}/transportSchedules/${scheduleId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`HTTP error! status: ${response.status}, message: ${errorData.error || 'Failed to delete schedule'}`);
                }
                loadSchedules();
            } catch (error) {
                console.error('Error deleting schedule:', error);
                if (error.message.includes('HTTP error!')) {
                    alert(`An error occurred while deleting schedule: ${error.message}. Please check the server.`);
                } else if (error instanceof TypeError) { // e.g., network error or CORS
                    alert('A network error occurred while deleting schedule. Please check your internet connection and try again.');
                } else {
                    alert('An unexpected error occurred while deleting schedule. Please try again later.');
                }
            }
        }
        
        // Reset modal on hide
        document.getElementById('scheduleModal').addEventListener('hidden.bs.modal', () => {
            document.getElementById('scheduleForm').reset();
            document.getElementById('scheduleId').value = '';
        });
    </script>
</body>
</html>
