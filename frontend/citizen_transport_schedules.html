<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transport Schedule - SmartCity</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary-color: rgba(255, 255, 255, 0.6);
        --secondary-color: rgba(255, 255, 255, 0.6);
        --sidebar-width: 260px;
        --text-dark: #03045e;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background: linear-gradient(
            rgba(255, 255, 255, 0.6),
            rgba(255, 255, 255, 0.6)
          ),
          url("https://i.ibb.co/S4yxVvP2/img-smartcity.jpg") center/cover fixed;
        color: var(--text-dark);
        margin: 0;
      }

      /* Sidebar Styling (Copied from Dashboard) */
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: var(--sidebar-width);
        background: linear-gradient(
          180deg,
          var(--primary-color),
          var(--secondary-color)
        );
        box-shadow: 4px 0 12px rgba(0, 0, 0, 0.05);
        border-top-right-radius: 20px;
        border-bottom-right-radius: 20px;
        color: rgba(0, 3, 154, 0.866);
        overflow-y: auto;
        z-index: 1000;
        transition: margin-left 0.4s ease-in-out;
      }

      .sidebar-header {
        padding: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .logo-img {
        width: 200px;
        max-width: 60%;
        height: auto;
        margin-bottom: 30px;
        border-radius: 15px;
        object-fit: contain;
        box-shadow: 0 8px 22px #03055e7a;
        background-color: #ffffffd0;
      }

      .logo-img:hover {
        transform: scale(1.06);
        box-shadow: 0 10px 28px rgba(19, 63, 110, 0.568);
      }

      .nav-link {
        color: #03045e;
        padding: 12px 20px;
        border-radius: 10px;
        transition: all 0.3s;
        display: flex;
        align-items: center;
      }

      .nav-link:hover {
        background-color: #0076b680;
        transform: translateX(5px);
        color: rgb(0, 5, 137);
      }

      .nav-link.active {
        background-color: #03045e;
        color: #caf0f8;
        font-weight: 600;
      }

      .nav-link i {
        margin-right: 10px;
        width: 20px;
        text-align: center;
      }

      .main-content {
        margin-left: var(--sidebar-width);
        padding: 20px;
        min-height: 100vh;
      }

      .welcome-banner {
        background: linear-gradient(
          135deg,
          var(--primary-color),
          var(--secondary-color)
        );
        border-radius: 15px;
        padding: 24px;
        box-shadow: 0 10px 25px #03055e76;
      }

      .card-glass {
        background: rgba(255, 255, 255, 0.6);
        border-radius: 18px;
        padding: 16px;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 15px #03055e78;
      }

      .filter-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 15px;
      }

      .badge-status {
        padding: 6px 10px;
        border-radius: 12px;
        color: white;
        font-size: 0.85rem;
      }

      .badge-on {
        background-color: #198754;
      }
      .badge-delayed {
        background-color: #dc3545;
      }
      .badge-maintenance {
        background-color: #fd7e14;
      }
      .badge-crowded {
        background-color: #0d6efd;
      }

      @media (max-width: 768px) {
        .sidebar {
          margin-left: -260px;
        }
        .sidebar.show {
          margin-left: 0;
        }
        .main-content {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
   <div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>
      <img src="assets/07.png" alt="Smart City Logo" class="logo-img" />
      SmartCity
    </h3>
    <small>CITIZEN</small>
  </div>

  <ul class="nav flex-column mt-3">
    <li class="nav-item">
      <a class="nav-link" href="dashboard.html">
        <i class="fas fa-home"></i> Dashboard
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" href="my_complaints.html">
        <i class="fas fa-file-alt"></i> My Complaints
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" href="submit_complaint.html">
        <i class="fas fa-plus-circle"></i> Submit Complaint
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" href="my_vehicles.html">
        <i class="fas fa-car"></i> My Vehicles
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" href="my-properties.html">
        <i class="fas fa-home"></i> My Properties
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link active" href="services.html">
        <i class="fas fa-concierge-bell"></i> Services
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" href="announcements.html">
        <i class="fas fa-bullhorn"></i> Announcements
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" href="profile.html">
        <i class="fas fa-user"></i> My Profile
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link" href="#" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </a>
    </li>
  </ul>
</div>


    <!-- Main Content -->
    <div class="main-content">
      <div
        class="welcome-banner d-flex justify-content-between align-items-center flex-wrap mb-3"
      >
        <div>
          <h1 class="mb-1">Public Transport</h1>
          <p class="opacity-75 mb-0">
            Filter, search, and explore Indore’s transport schedules.
          </p>
        </div>
        <button class="btn btn-light mt-3 mt-md-0" onclick="toggleSidebar()">
          <i class="fas fa-bars me-2"></i>Menu
        </button>
      </div>

      <div class="card-glass">
        <div class="filter-controls">
          <input
            type="text"
            id="searchBox"
            class="form-control"
            placeholder="Search route, stop, or station..."
            style="flex: 1"
          />
          <select id="modeFilter" class="form-select" style="width: 200px">
            <option value="">All Modes</option>
            <option value="Bus">Bus</option>
            <option value="Metro">Metro</option>
            <option value="Tram">Tram</option>
            <option value="Electric Bus">Electric Bus</option>
            <option value="Mini Bus">Mini Bus</option>
          </select>
          <button class="btn btn-outline-primary" onclick="sortByTime()">
            <i class="fa-solid fa-clock"></i> Sort by Time
          </button>
          <button class="btn btn-outline-success" onclick="sortByStatus()">
            <i class="fa-solid fa-signal"></i> Sort by Status
          </button>
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th>ID</th>
                <th>Mode</th>
                <th>Route</th>
                <th>Start</th>
                <th>End</th>
                <th>Frequency</th>
                <th>Days</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const API_BASE_URL = 'http://localhost:5000/api';
      const token = localStorage.getItem('token');

      function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("show");
      }

      function logout() {
        if (confirm("Are you sure you want to logout?")) {
          localStorage.clear();
          window.location.href = "login.html";
        }
      }

      let allSchedules = [];
      let currentData = [];

      async function loadSchedules() {
        try {
          const res = await fetch(`${API_BASE_URL}/transportSchedules`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          allSchedules = await res.json();
          currentData = [...allSchedules];
          renderTable(currentData);
        } catch (error) {
          console.error('Failed to load schedules:', error);
        }
      }

      function renderTable(data) {
        const tbody = document.getElementById("scheduleBody");
        tbody.innerHTML = "";
        data.forEach((s) => {
          const badgeClass =
            s.status === "On-time"
              ? "badge-on"
              : s.status === "Delayed"
              ? "badge-delayed"
              : s.status === "Maintenance"
              ? "badge-maintenance"
              : "badge-crowded";

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${s.schedule_id}</td>
            <td>${s.mode}</td>
            <td>${s.start_point} → ${s.end_point}</td>
            <td>${s.start_time}</td>
            <td>${s.end_time}</td>
            <td>${s.frequency}</td>
            <td>${s.days_of_operation}</td>
            <td><span class="badge-status ${badgeClass}">${s.status}</span></td>
          `;
          tbody.appendChild(tr);
        });
      }

      function applyFilters() {
        const searchText = document
          .getElementById("searchBox")
          .value.toLowerCase();
        const modeFilter = document.getElementById("modeFilter").value;

        const filtered = allSchedules.filter((s) => {
          const matchesSearch =
            s.start_point.toLowerCase().includes(searchText) ||
            s.end_point.toLowerCase().includes(searchText);
          const matchesMode = modeFilter ? s.mode === modeFilter : true;
          return matchesSearch && matchesMode;
        });

        currentData = filtered;
        renderTable(filtered);
      }

      function sortByTime() {
        currentData.sort(
          (a, b) => a.start_time.localeCompare(b.start_time)
        );
        renderTable(currentData);
      }

      function sortByStatus() {
        const order = ["On-time", "Crowded", "Delayed", "Maintenance"];
        currentData.sort(
          (a, b) => order.indexOf(a.status) - order.indexOf(b.status)
        );
        renderTable(currentData);
      }

      document
        .getElementById("searchBox")
        .addEventListener("input", applyFilters);
      document
        .getElementById("modeFilter")
        .addEventListener("change", applyFilters);

      document.addEventListener('DOMContentLoaded', loadSchedules);
    </script>
  </body>
</html>
