<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transport Schedule - SmartCity</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary-color: rgba(255, 255, 255, 0.6);
        --secondary-color: rgba(255, 255, 255, 0.6);
        --sidebar-width: 260px;
        --text-dark: #03045e;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background: linear-gradient(
            rgba(255, 255, 255, 0.6),
            rgba(255, 255, 255, 0.6)
          ),
          url("https://i.ibb.co/S4yxVvP2/img-smartcity.jpg") center/cover fixed;
        color: var(--text-dark);
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: var(--sidebar-width);
        background: linear-gradient(
          180deg,
          var(--primary-color),
          var(--secondary-color)
        );
        box-shadow: 4px 0 12px rgba(0, 0, 0, 0.05);
        border-top-right-radius: 20px;
        border-bottom-right-radius: 20px;
        color: rgba(0, 3, 154, 0.866);
        overflow-y: auto;
        z-index: 1000;
        transition: margin-left 0.4s ease-in-out;
      }

      .sidebar-header {
        padding: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .logo-img {
        width: 180px;
        max-width: 70%;
        height: auto;
        border-radius: 15px;
        box-shadow: 0 8px 22px #03055e7a;
        background-color: #ffffffd0;
        margin-bottom: 15px;
      }

      .nav-link {
        color: #03045e;
        padding: 12px 20px;
        border-radius: 10px;
        transition: all 0.3s;
        display: flex;
        align-items: center;
      }

      .nav-link:hover {
        background-color: #0076b680;
        transform: translateX(5px);
        color: rgb(0, 5, 137);
      }

      .nav-link.active {
        background-color: #03045e;
        color: #caf0f8;
        font-weight: 600;
      }

      .main-content {
        margin-left: var(--sidebar-width);
        padding: 20px;
        min-height: 100vh;
      }

      .welcome-banner {
        background: linear-gradient(
          135deg,
          var(--primary-color),
          var(--secondary-color)
        );
        border-radius: 15px;
        padding: 24px;
        box-shadow: 0 10px 25px #03055e76;
      }

      .card-glass {
        background: rgba(255, 255, 255, 0.6);
        border-radius: 18px;
        padding: 16px;
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 15px #03055e78;
      }

      @media (max-width: 768px) {
        .sidebar {
          margin-left: -260px;
        }
        .sidebar.show {
          margin-left: 0;
        }
        .main-content {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="assets/07.png" alt="SmartCity Logo" class="logo-img" />
        <h4>SmartCity</h4>
        <small>CITIZEN PANEL</small>
      </div>

      <ul class="nav flex-column mt-3">
        <li class="nav-item">
          <a class="nav-link" href="dashboard.html"
            ><i class="fas fa-home"></i> Dashboard</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link" href="my_complaints.html"
            ><i class="fas fa-file-alt"></i> My Complaints</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link" href="submit_complaint.html"
            ><i class="fas fa-plus-circle"></i> Submit Complaint</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="services.html"
            ><i class="fas fa-concierge-bell"></i> Services</a
          >
        </li>
      </ul>
    </div>

    <div class="main-content">
      <div
        class="welcome-banner d-flex justify-content-between align-items-center flex-wrap mb-3"
      >
        <div>
          <h1 class="mb-1">Public Transport</h1>
          <p class="opacity-75 mb-0">View current city transport schedules.</p>
        </div>
        <button class="btn btn-light mt-3 mt-md-0" onclick="toggleSidebar()">
          <i class="fas fa-bars me-2"></i>Menu
        </button>
      </div>

      <div class="card-glass mb-3">
        <h5 class="mb-2">
          <i class="fa-solid fa-bus me-2 text-success"></i> Transport Schedule
        </h5>
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th>Schedule ID</th>
                <th>Mode</th>
                <th>Route</th>
                <th>Start Time</th>
                <th>End Time</th>
                <th>Frequency</th>
                <th>Days</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("show");
      }

      // Example static data (based on your DB schema)
      const schedules = [
        {
          schedule_id: 1,
          transport_id: 3,
          mode: "Bus",
          route_id: 2,
          start_point: "Rajwada",
          end_point: "Vijay Nagar Square",
          start_time: "07:00:00",
          end_time: "22:00:00",
          frequency: "Every 20 mins",
          days_of_operation: "Mon-Sun",
          status: "On-time",
        },
        {
          schedule_id: 2,
          transport_id: 3,
          mode: "Bus",
          route_id: 3,
          start_point: "Airport",
          end_point: "Railway Station",
          start_time: "06:00:00",
          end_time: "23:00:00",
          frequency: "Every 15 mins",
          days_of_operation: "Mon-Sat",
          status: "Delayed",
        },
      ];

      function loadSchedules() {
        const tbody = document.getElementById("scheduleBody");
        tbody.innerHTML = "";
        schedules.forEach((s) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${s.schedule_id}</td>
            <td>${s.mode}</td>
            <td>${s.start_point} → ${s.end_point}</td>
            <td>${s.start_time}</td>
            <td>${s.end_time}</td>
            <td>${s.frequency}</td>
            <td>${s.days_of_operation}</td>
            <td>${s.status}</td>
          `;
          tbody.appendChild(tr);
        });
      }

      loadSchedules();
    </script>
  </body>
</html>
