<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - Smart City</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
       :root {
        --primary-color: rgba(255, 255, 255, 0.6); /* Deep clean blue */
        --secondary-color: rgba(255, 255, 255, 0.6); /* Accent blue */
        --sidebar-width: 260px;
        --bg-light: #f5f8ff;
        --text-dark: #03045E;
      }
        
        body {
        font-family: "Montserrat", sans-serif;
background:
    /* 1. NEW: Semi-transparent white background color */
            linear-gradient(rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.6)),
            /* Subtle dark overlay for readability */
            
                /* Your provided image link */
            url('https://i.ibb.co/S4yxVvP2/img-smartcity.jpg ') center center / cover no-repeat fixed;
            background-color: rgba(255, 0, 0, 0.94); 
            color: var(--text-dark);
        margin: 0;
        padding: 0;
      }

        
        .sidebar {
            position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: var(--sidebar-width);
        
        background: linear-gradient(
          180deg,
          var(--primary-color),
          var(--secondary-color)
        );
        box-shadow: 4px 0 12px rgba(0, 0, 0, 0.05);
        border-top-right-radius: 20px;
        border-bottom-right-radius: 20px;

        color: rgba(0, 3, 154, 0.866);
        overflow-y: auto;
        transition: all 0.3s;
        z-index: 1000;
        transition: margin-left 0.4s ease-in-out;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .nav-link {
            color: #03045E;
        padding: 12px 20px;
        border-radius: 10px;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        }
        
        .nav-link:hover {
            background-color: #0076b680;
        transform: translateX(5px);

        color: rgb(0, 5, 137);
        }
        
        .nav-link.active {
            background-color: #03045e;
        color: #CAF0F8;
        font-weight: 600;
        }
        
        .nav-link i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 20px;
            min-height: 100vh;
        }
        
        .welcome-banner {
            background: linear-gradient(
          135deg,
          var(--primary-color),
          var(--secondary-color)
        );
        border-radius: 15px;
        padding: 30px;
        color: #03045E;
        margin-bottom: 30px;
        box-shadow: 0 10px 25px #03055e76;
        }
        
        .page-title {
            color: #03045E;
            font-weight: 700;
        }

        .service-card {
        background: rgba(255, 255, 255, 0.6);
        border-radius: 18px;
        padding: 25px;
        backdrop-filter: blur(10px);

        box-shadow: 0 4px 15px #03055e78;
        transition: all 0.3s ease;
        border-left: 4px solid;
        border-right: 4px solid;
        color: #03045E;
        }

        .service-card:hover {
            background: var(--bg-light);
        transform: translateY(-3px);
        color: #03045E;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .service-icon {
            font-size: 4rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            display: block;
        }

        @media (max-width: 768px) {
            .sidebar {
                margin-left: calc(-1 * var(--sidebar-width));
            }
            .sidebar.show {
                margin-left: 0;
            }
            .main-content {
                margin-left: 0;
            }
        }
/* // */
      /* Enhanced Responsive Logo Styling */
      .logo-img {
        width: 200px; /* Bigger default size */
        max-width: 60%; /* Prevents overflow on smaller viewports */
        height: auto;
        margin-bottom: 30px;
        border-radius: 15px;
        object-fit: contain;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        box-shadow: 0 8px 22px #03055e7a;
        background-color: #ffffffd0;
      }

      /* Hover animation to match the elegant button style */
      .logo-img:hover {
        transform: scale(1.06);
        box-shadow: 0 10px 28px rgba(19, 63, 110, 0.568);
      }

      /* Responsive adjustments for various screen sizes */
      @media (max-width: 992px) {
        .logo-img {
          width: 170px;
          margin-bottom: 25px;
        }
      }

      @media (max-width: 768px) {
        .logo-img {
          width: 140px;
          margin-bottom: 22px;
        }
      }

      @media (max-width: 576px) {
        .logo-img {
          width: 110px;
          margin-bottom: 18px;
        }
      }

      /* // */



    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>
                <!-- <i class="fas fa-city me-2"></i> -->
                <img src="assets/07.png" alt="Smart City Logo" class="logo-img" />
                SmartCity
            </h3>
            <small id="userRole">CITIZEN</small>
        </div>
        
        <ul class="nav flex-column mt-3">
            <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="my_complaints.html"><i class="fas fa-file-alt"></i> My Complaints</a></li>
            <li class="nav-item"><a class="nav-link" href="submit_complaint.html"><i class="fas fa-plus-circle"></i> Submit Complaint</a></li>
            <li class="nav-item"><a class="nav-link" href="my_vehicles.html"><i class="fas fa-car"></i> My Vehicles</a></li>
            <li class="nav-item"><a class="nav-link" href="my_properties.html"><i class="fas fa-home"></i> My Properties</a></li>
            <li class="nav-item"><a class="nav-link active" href="services.html"><i class="fas fa-concierge-bell"></i> Services</a></li>
            <li class="nav-item"><a class="nav-link" href="announcements.html"><i class="fas fa-bullhorn"></i> Announcements</a></li>
            <li class="nav-item"><a class="nav-link" href="profile.html"><i class="fas fa-user"></i> My Profile</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="welcome-banner">
            <div class="d-flex justify-content-between align-items-center flex-wrap">
                <div>
                    <h1 class="mb-2">Explore City Services</h1>
                    <p class="mb-3 opacity-75">Browse and book services provided through the city infrastructure and certified partners.</p>
                </div>
                <button class="btn btn-light mt-3 mt-md-0" onclick="toggleSidebar()">
                    <i class="fas fa-bars me-2"></i> Menu
                </button>
            </div>
        </div>

        <h2 class="page-title mb-4"><i class="fas fa-concierge-bell me-2"></i>Available Services</h2>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="servicesGrid">
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        const token = localStorage.getItem('token');

        // --- Shared JS functions ---
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.clear();
                window.location.href = 'login.html'; // Adjust to your login page
            }
        }
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('show');
        }
        // --- End Shared JS functions ---

        async function loadServices() {
            try {
                const res = await fetch(`${API_BASE_URL}/services/grouped`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const servicesByCategory = await res.json();
                
                const grid = document.getElementById('servicesGrid');
                grid.innerHTML = ''; 

                for (const category in servicesByCategory) {
                    const services = servicesByCategory[category];
                    const service = services[0]; // Use the first service in the category to represent the card

                    const iconMap = {
                        'healthcare': { icon: 'fa-notes-medical', color: 'danger', link: 'citizen_book_appointment.html' },
                        'transport': { icon: 'fa-bus', color: 'success', link: 'citizen_transport_schedules.html' },
                        'internet': { icon: 'fa-wifi', color: 'primary', link: 'citizen_internet_coverage.html' },
                        'electricity': { icon: 'fa-bolt', color: 'warning', link: 'citizen_electricity_bill.html' },
                        'water': { icon: 'fa-faucet', color: 'info', link: 'submit_complaint.html' },
                        'waste': { icon: 'fa-trash-alt', color: 'info', link: 'submit_complaint.html' },
                        'uncategorized': { icon: 'fa-concierge-bell', color: 'secondary', link: 'submit_complaint.html' }
                    };
                    const map = iconMap[category] || { icon: 'fa-concierge-bell', color: 'secondary', link: 'submit_complaint.html' };

                    const card = `
                        <div class="col">
                            <div class="card service-card p-4 text-center">
                                <i class="fas ${map.icon} service-icon text-${map.color}"></i>
                                <h5 class="card-title">${category.charAt(0).toUpperCase() + category.slice(1)}</h5>
                                <p class="card-text small text-muted">${service.service_name}</p>
                                <a href="${map.link}" class="btn btn-outline-${map.color} mt-2">Explore</a>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += card;
                }
            } catch (error) {
                console.error('Failed to load services:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadServices);
    </script>
</body>
</html>
