    <style>

        .auth-left {

/* Ensure text and icons are dark */

}

            margin-bottom: 20px;
            font-family: var(--font-family-heading);

        }

            font-size: 1.1rem;
            opacity: 0.9;
            font-family: var(--font-family-body);
        }
        
        .auth-right {
            background: rgb(244, 238, 232);

            padding: 60px 40px;
        }
        /* Applied new heading font to the right panel heading */
        .auth-right h2 {
            font-family: var(--font-family-heading);
            font-weight: 600;
            color: #333;
        }

        /* 5. UPDATED: Primary Color for Focus */
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);

        }

        /* 6. UPDATED: Button Color (uses CSS Variables) */
        .btn-primary {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);

        }

        }
        .icon-large {
            font-size: 4rem;

        }
        .auth-form {

        }
        .auth-form.active {

        }

        /* // */
/* Enhanced Responsive Logo Styling */
.logo-img {
    width: 200px;             /* Bigger default size */
    max-width: 60%;           /* Prevents overflow on smaller viewports */
    height: auto;
    margin-bottom: 30px;
    border-radius: 15px;
    object-fit: contain;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 8px 22px rgba(0, 0, 0, 0.25);
}

/* Hover animation to match the elegant button style */

    box-shadow: 0 10px 28px rgba(19, 63, 110, 0.568);
}

    </style>
</head>
<body>
    <div class="auth-container">
        <div class="row g-0">
            <div class="col-lg-5 auth-left">
                <!-- <i class="fas fa-city icon-large"></i> -->
                <img src="assets/07.png" alt="Smart City Logo" class="logo-img">


                <h1>SmartCity</h1>
                <p>Manage your smart city infrastructure with ease</p>
                <div class="mt-4">
                    <!-- <i class="fi fi-rr-users-alt"></i>
                    <i class="fi fi-rr-building"></i>    
                    <i class="fi fi-rr-bus"></i>     -->
                   

                    <i class="fas fa-users me-3"></i>
                    <i class="fas fa-building me-3"></i>
                    <i class="fas fa-bus me-3"></i>
                    <i class="fas fa-hospital"></i>
                </div>
            </div>
            <div class="col-lg-7 auth-right">
                <ul class="nav nav-tabs" id="authTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="signup-tab" data-bs-toggle="tab" data-bs-target="#signup" type="button" role="tab">
                            <i class="fas fa-user-plus me-2"></i>Sign Up
                        </button>
                    </li>
                </ul>

                <div id="alertContainer"></div>
                
                <div class="tab-content" id="authTabsContent">
                    <div class="tab-pane fade show active" id="login" role="tabpanel">
                        <h2 class="mb-2">Welcome Back</h2>
                        <p class="text-muted mb-4">Sign in to access your dashboard</p>
                        
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="loginEmail" class="form-label">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                    <input type="email" class="form-control" id="loginEmail" placeholder="Enter your email" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="loginPassword" class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required>
                                    <button class="btn btn-outline-secondary" type="button" id="toggleLoginPassword">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label" for="rememberMe">Remember me</label>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 mb-3">
                                <i class="fas fa-sign-in-alt me-2"></i>Sign In
                            </button>
                            
                            <div class="text-center">
                                <a href="#" class="text-decoration-none">Forgot Password?</a>
                            </div>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="signup" role="tabpanel">
                        <h2 class="mb-2">Create Account</h2>
                        <p class="text-muted mb-4">Sign up to get started</p>
                        
                        <form id="signupForm">
                            <div class="mb-3">
                                <label for="signupEmail" class="form-label">Email Address <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                    <input type="email" class="form-control" id="signupEmail" placeholder="Enter your email" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="signupPassword" class="form-label">Password <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control" id="signupPassword" placeholder="Create a password" required minlength="6">
                                    <button class="btn btn-outline-secondary" type="button" id="toggleSignupPassword">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <small class="text-muted">Minimum 6 characters</small>
                            </div>

                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Confirm Password <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="role" class="form-label">I am a <span class="text-danger">*</span></label>
                                <select class="form-select" id="role" required>
                                    <option value="">Select Role</option>
                                    <option value="citizen">Citizen</option>
                                    <option value="transport">Transport</option>
                                    <option value="utility">Utility</option>
                                    <option value="healthcare">Healthcare</option>
                                </select>
                            </div>
                            
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="agreeTerms" required>
                                <label class="form-check-label" for="agreeTerms">
                                    I agree to the Terms and Conditions
                                </label>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100 mb-3">
                                <i class="fas fa-user-plus me-2"></i>Create Account
                            </button>
                            
                            <div class="text-center text-muted">
                                <small>Note: Admin accounts can only be created by system administrators</small>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE_URL = 'http://localhost:5000/api'

        // Toggle password visibility for login
        document.getElementById('toggleLoginPassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('loginPassword');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Toggle password visibility for signup
        document.getElementById('toggleSignupPassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('signupPassword');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Show alert function
        function showAlert(message, type = 'danger') {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing in...';
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store token and user info
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userRole', data.role);
                    localStorage.setItem('userEmail', email);
                    if (data.linked_id) {
                        localStorage.setItem('linkedId', data.linked_id);
                    }
                    
                    showAlert('Login successful! Redirecting...', 'success');
                    
                    // Redirect based on role after 1 second
                    setTimeout(() => {
                        const role = (data.role || '').toLowerCase();
                        if (role === 'admin') {
                            window.location.href = 'admin.html';
                        } else if (role === 'healthcare') {
                            window.location.href = 'healthcare-dashboard.html';
                        } else if (role === 'transport') {
                            window.location.href = 'transport-main-dashboard.html';
                        } else if (role === 'utility') {
                            window.location.href = 'utilities_dashboard.html';

                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 1000);
                } else {
                    showAlert(data.error || 'Login failed. Please check your credentials.');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Connection error. Please make sure the server is running on port 5000.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
            }
        });

        // Sign up form submission
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
                const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            // Validate passwords match
            if (password !== confirmPassword) {
                showAlert('Passwords do not match!');
                return;
            }
            
            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Creating account...';
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        email,
                        password, 
                        role
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('Account created successfully! Please complete your profile.', 'success');
                    
                    // Store temporary data for profile completion
                    localStorage.setItem('tempEmail', email);
                    localStorage.setItem('tempRole', role);
                    localStorage.setItem('needsProfileCompletion', 'true');
                    
                    // Redirect to profile completion after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'completeProfile.html';
                    }, 2000);
                } else {
                    showAlert(data.error || 'Registration failed. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Create Account';
                }
            } catch (error) {
                console.error('Signup error:', error);
                showAlert('Connection error. Please make sure the server is running on port 5000.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Create Account';
            }
        });

        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
